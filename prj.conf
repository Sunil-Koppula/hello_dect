CONFIG_NRF_MODEM_LIB=y

CONFIG_MODEM_ANTENNA=n

CONFIG_CARRIER=525
CONFIG_TX_POWER=13
CONFIG_MCS=2

CONFIG_MAIN_LOG_LEVEL=3
CONFIG_MAIN_SUB_LOG_LEVEL=3
CONFIG_RADIO_LOG_LEVEL=3
CONFIG_MESH_LOG_LEVEL=3
CONFIG_DATA_LOG_LEVEL=3
CONFIG_LARGE_DATA_LOG_LEVEL=3
CONFIG_PRODUCT_INFO_LOG_LEVEL=3
CONFIG_PSRAM_LOG_LEVEL=3
CONFIG_QUEUE_LOG_LEVEL=3
CONFIG_STORAGE_LOG_LEVEL=3
CONFIG_CONFIG_LOG_LEVEL=3
CONFIG_TRACKER_LOG_LEVEL=3

CONFIG_NRF_MODEM_LINK_BINARY_DECT_PHY=y
CONFIG_HWINFO=y
CONFIG_GPIO=y
CONFIG_I2C=y
CONFIG_EEPROM=y
CONFIG_EEPROM_AT24=y

CONFIG_ENTROPY_GENERATOR=y
CONFIG_REBOOT=y
CONFIG_SPI=y
CONFIG_CRC=y

CONFIG_LOG=y

CONFIG_MAIN_STACK_SIZE=4096

# AT command UART (UART1, re-pinned in overlay). UART0 stays on console/logs.
# Async UART + DMA is required for the h745-style SLM AT transport.
CONFIG_SERIAL=y
CONFIG_UART_ASYNC_API=y
CONFIG_RING_BUFFER=y
